name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

# Deploy to Vercel for full-stack features (admin, API, Supabase).
# GitHub Pages static hosting is not suitable for this platform.
# See README.md for Vercel deployment instructions.
